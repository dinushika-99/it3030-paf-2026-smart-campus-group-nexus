spring.application.name=backend

# Load local environment overrides from backend/.env when present
spring.config.import=optional:file:.env[.properties]

# --- MySQL datasource configuration ---
# Replace 'smartcampus' with your database name
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_campus_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

# Replace with your MySQL username
spring.datasource.username=${DB_USERNAME:root}

# Replace with your MySQL password
spring.datasource.password=${DB_PASSWORD:}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
## Let Hibernate auto-detect the correct MySQL dialect (MySQLDialect in Hibernate 7)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (optional, default is 8080)
server.port=8081



# --- Google OAuth2 (fill with your credentials) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

# --- GitHub OAuth2 (for frontend code flow callback) ---
app.auth.github.client-id=${GITHUB_CLIENT_ID:}
app.auth.github.client-secret=${GITHUB_CLIENT_SECRET:}
app.auth.github.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:3000/auth/github/callback}


spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

app.upload.dir=uploads/tickets

# JWT settings (use env var in production)
app.auth.jwt.secret=${JWT_SECRET_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
app.auth.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
app.auth.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:14}
app.auth.jwt.two-factor-minutes=${JWT_TWO_FACTOR_MINUTES:5}
app.auth.totp.issuer=${TOTP_ISSUER:NEXUS}
