spring.application.name=backend

# Load local environment variables from backend/.env (key=value format)
spring.config.import=optional:file:.env[.properties]

# --- MySQL datasource configuration ---
# Replace 'smartcampus' with your database name
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Replace with your MySQL username
spring.datasource.username=root

# Replace with your MySQL password
spring.datasource.password=1234

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
## Let Hibernate auto-detect the correct MySQL dialect (MySQLDialect in Hibernate 7)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (optional, default is 8080)
server.port=8081



# --- Google OAuth2 (fill with your credentials) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
